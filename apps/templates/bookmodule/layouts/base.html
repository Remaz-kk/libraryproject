<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock title %}</title>

    <meta name="keywords" content="Books, recent, Learning, library">
    <meta name="description" content="Books website">
    <meta name="author" content="author name">
    <link rel="icon" href="{% static 'qu-icon.png' %}">

    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    {% block stylesheets %}{% endblock stylesheets %}
</head>
<body>
    {% include "bookmodule/includes/header.html" %}
    <div class="content">
        {% block content %}{% endblock content %}
    </div>
    {% include "bookmodule/includes/footer.html" %}
</body>
</html>
